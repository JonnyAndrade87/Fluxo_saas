name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  NODE_VERSION: "22"

jobs:
  ci:
    name: Lint → Test → Build → Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint -- --max-warnings 259

      - name: Test
        run: npm test
        env:
          MFA_SECRET_KEY: ${{ secrets.MFA_SECRET_KEY || 'ci-placeholder-key-minimum-32-chars-x' }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET || 'ci-placeholder-auth-secret' }}
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://ci:ci@localhost:5432/ci' }}

      - name: Build
        run: npm run build
        env:
          MFA_SECRET_KEY: ${{ secrets.MFA_SECRET_KEY || 'ci-placeholder-key-minimum-32-chars-x' }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET || 'ci-placeholder-auth-secret' }}
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://ci:ci@localhost:5432/ci' }}
          NEXT_PUBLIC_APP_URL: https://example.com

      - name: Security audit (production deps only)
        run: npm audit --omit=dev --audit-level=high
