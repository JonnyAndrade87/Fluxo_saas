name: Super-Linter

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions: {}

jobs:
  super-linter:
    name: Super-Linter
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: read
      # Escreve status checks nos commits
      statuses: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Super-linter precisa do histórico completo para detectar arquivos alterados
          fetch-depth: 0
          persist-credentials: false

      - name: Super-Linter
        uses: super-linter/super-linter/slim@v8.6.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # ── Linters ativos para o stack do Fluxeer ──────────────────────────
          # TypeScript / JavaScript
          VALIDATE_TYPESCRIPT_ES: true
          VALIDATE_JAVASCRIPT_ES: true

          # JSON
          VALIDATE_JSON: true

          # YAML (GitHub Actions, etc.)
          VALIDATE_YAML: true

          # CSS
          VALIDATE_CSS: true

          # Markdown
          VALIDATE_MARKDOWN: true

          # GitHub Actions
          VALIDATE_GITHUB_ACTIONS: true

          # Secrets / leaks
          VALIDATE_GITLEAKS: true

          # ── Linters desativados (não usados no projeto) ─────────────────────
          VALIDATE_ANSIBLE: false
          VALIDATE_ARM: false
          VALIDATE_BASH: false
          VALIDATE_CLOJURE: false
          VALIDATE_CLOUDFORMATION: false
          VALIDATE_COFFEESCRIPT: false
          VALIDATE_CPP: false
          VALIDATE_CSHARP: false
          VALIDATE_DART: false
          VALIDATE_DOCKERFILE_HADOLINT: false
          VALIDATE_EDITORCONFIG: false
          VALIDATE_ENV: false
          VALIDATE_GO: false
          VALIDATE_GROOVY: false
          VALIDATE_HTML: false
          VALIDATE_JAVA: false
          VALIDATE_KOTLIN: false
          VALIDATE_LATEX: false
          VALIDATE_LUA: false
          VALIDATE_OPENAPI: false
          VALIDATE_PERL: false
          VALIDATE_PHP_BUILTIN: false
          VALIDATE_PHP_PHPCS: false
          VALIDATE_PHP_PHPSTAN: false
          VALIDATE_PHP_PSALM: false
          VALIDATE_POWERSHELL: false
          VALIDATE_PROTOBUF: false
          VALIDATE_PYTHON_BLACK: false
          VALIDATE_PYTHON_FLAKE8: false
          VALIDATE_PYTHON_ISORT: false
          VALIDATE_PYTHON_PYLINT: false
          VALIDATE_PYTHON_RUFF: false
          VALIDATE_R: false
          VALIDATE_RUBY: false
          VALIDATE_RUST_2015: false
          VALIDATE_RUST_2018: false
          VALIDATE_RUST_2021: false
          VALIDATE_SCALA: false
          VALIDATE_SHELL_SHFMT: false
          VALIDATE_SNAKEMAKE_LINT: false
          VALIDATE_SQL: false
          VALIDATE_TERRAFORM_FMT: false
          VALIDATE_TERRAFORM_TERRASCAN: false
          VALIDATE_TERRAFORM_TFLINT: false
          VALIDATE_TERRAGRUNT: false
          VALIDATE_TSX: false
          VALIDATE_TYPESCRIPT_STANDARD: false
          VALIDATE_VUE: false
          VALIDATE_XML: false

          # ── Configurações adicionais ─────────────────────────────────────────
          # Só linta arquivos alterados em PRs (mais rápido)
          FILTER_REGEX_EXCLUDE: ".*(node_modules|.next|.vercel|dist|build|prisma/migrations).*"

          # Modo de saída: mostra apenas erros (não warnings)
          LOG_LEVEL: WARN

          # Não cria comentários automáticos no PR (para não poluir)
          CREATE_LOG_FILE: false
