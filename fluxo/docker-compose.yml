version: '3.8'

services:
  # ============================================================================
  # PostgreSQL Database (Optional - for production testing)
  # ============================================================================
  postgres:
    image: postgres:16-alpine
    container_name: fluxo-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-fluxo}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-fluxo-dev-password}
      POSTGRES_DB: ${DB_NAME:-fluxo}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-fluxo}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================================
  # Redis Cache (Optional - for session management)
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: fluxo-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================================
  # Next.js Application
  # ============================================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fluxo-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://${DB_USER:-fluxo}:${DB_PASSWORD:-fluxo-dev-password}@postgres:5432/${DB_NAME:-fluxo}
      REDIS_URL: redis://redis:6379
      AUTH_SECRET: ${AUTH_SECRET:-fluxo-dev-secret}
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      RESEND_API_KEY: ${RESEND_API_KEY}
      WEBHOOK_SECRET_RESEND: ${WEBHOOK_SECRET_RESEND}
      ZAPI_INSTANCE_ID: ${ZAPI_INSTANCE_ID}
      ZAPI_API_TOKEN: ${ZAPI_API_TOKEN}
      WEBHOOK_SECRET_ZAPI: ${WEBHOOK_SECRET_ZAPI}
    volumes:
      - ./src:/app/src
      - ./prisma:/app/prisma
      - ./public:/app/public
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================================================
  # Adminer (Database Management UI - Development Only)
  # ============================================================================
  adminer:
    image: adminer:latest
    container_name: fluxo-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    environment:
      ADMINER_DEFAULT_SERVER: postgres

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  default:
    name: fluxo-network
